<!DOCTYPE html>
<html>
    <head>
        <title>Professional Form Formatting</title>
        <style>
            form{
                text-align: center;
                border: 3px solid black;
                 width: 700px;
                margin: auto;
                background-color: lightgreen;
            
            }
            .vighnesh{
                margin:10px;
                }           
                  label{
                       display:inline-block;
                       width:150px;
                       text-align:left;
                }     
                                         
        </style>
    </head>
    <body>
        <form action="index.html"
        target="_blank">
                <h1> 
                <b>Employee Registration</b>
                </h1>
            <br><br>
            <div class="vighnesh"> 
            <label for="name"><b>Employee Name:</b></label>
            <input
                 type="text"
                id="name"
                pattern="[A-Za-z]{5,50}"
                name="employee_name"
                required>
                   <br><br></div>

                   <div class="vighnesh"> 
                   <label for="address"><b>Address:</b></label>
                   <input type="text" id="address" name="address">
                   <br><br></div>

                   <div class="vighnesh"> 
                   <label for="DOB"><b>DOB:</b></label>
                   <input type="date" 
                        id="DOB"
                        name="dob">
                        <br><br></div>

                        <div class="vighnesh"> 
                        <label for="Bplace"><b>Birth Of Place:</b></label>
                        <input type="text"
                               id="Bplace"
                               name="Bplace"
                               pattern="[A-Za-z ]{3,30}"
                               required>
                               <br><br></div>

                               <div class="vighnesh"> 
                               <label for="gender"><b>Gender:</b></label>
                               <input type="radio" name="gender"
                               value="Male">Male

                               <input type="radio" name="gender"
                               value="Female">Female
                               <br><br></div>

                               <div class="vighnesh"> 
                               <label for="age"><b>Age:</b></label>
                               <input type="number"
                                         id="age"
                                         name="age"
                                          min="18"
                                          max="25"
                                         required>
                                         <br><br></div>

                               <div class="vighnesh"> 
                                         <label for="number"><b>Contact No:</b></label>
                               <input
                                      type="tel"
                                      id="number"
                                      name="number"
                                      pattern="[0-9]{10}"
                                      maxlength="10"
                                      required>
                                       <br><br></div>

                                       <div class="vighnesh"> 
                                       <label for="email"><b>Email:</b></label>
                                       <input type="email"
                                              id="email"
                                              name="email">
                                              <br><br></div>

                                              <div class="vighnesh"> 
                                              <label for="qualification"><b>Highest Qualification:</b></label>
                                              <input type="text"
                                                     id="qualification"
                                                     name="qualification">
                                                     <br><br></div>

                                                     <div class="vighnesh"> 
                                                     <label for="experience"><b>Experience:</b></label>
                                                     <textarea id="experience"
                                                     name="experience"
                                                     rows="2"
                                                     cols="25"
                                                     style="resize: none;"
                                                     ></textarea></div>       
                                                     <br>


                                                     <button type="submit"><b>submit</b></button>
                                                </form>
                                             </body>
                                        </html>
